name: Build Windows EXE (Launch4j)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Folders and Dependencies
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "desktop\lib"
        Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar" -OutFile "desktop\lib\gson-2.10.1.jar"

    - name: Compile Java
      shell: pwsh
      run: |
        cd desktop
        javac -cp "lib\gson-2.10.1.jar" -d . DesktopApp.java

    - name: Create JAR
      shell: pwsh
      run: |
        cd desktop
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class

    - name: Download Launch4j
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://netcologne.dl.sourceforge.net/project/launch4j/launch4j-3/3.50/launch4j-3.50-win32.zip" -OutFile "launch4j.zip"
        Expand-Archive -Path "launch4j.zip" -DestinationPath "."
        Move-Item "launch4j-3.50-win32" "launch4j"

    - name: Create EXE with Launch4j
      shell: pwsh
      run: |
        # Create launch4j config file
        $config = @'
<?xml version="1.0" encoding="UTF-8"?>
<launch4jConfig>
  <dontWrapJar>false</dontWrapJar>
  <headerType>gui</headerType>
  <jar>desktop/AlfarooqDesktop.jar</jar>
  <outfile>AlfarooqApp.exe</outfile>
  <errTitle>Alfarooq</errTitle>
  <cmdLine></cmdLine>
  <chdir>.</chdir>
  <priority>normal</priority>
  <downloadUrl>https://java.com/download</downloadUrl>
  <supportUrl></supportUrl>
  <stayAlive>false</stayAlive>
  <restartOnCrash>false</restartOnCrash>
  <manifest></manifest>
  <icon>desktop/icons/hgd.ico</icon>
  <jre>
    <minVersion>11</minVersion>
    <maxVersion></maxVersion>
    <jdkPreference>preferJre</jdkPreference>
    <runtimeBits>64</runtimeBits>
  </jre>
  <versionInfo>
    <fileVersion>1.0.0.0</fileVersion>
    <txtFileVersion>1.0.0.0</txtFileVersion>
    <fileDescription>Alfarooq Desktop Application</fileDescription>
    <copyright>Alfarooq</copyright>
    <productVersion>1.0.0.0</productVersion>
    <txtProductVersion>1.0.0.0</txtProductVersion>
    <productName>AlfarooqApp</productName>
    <internalName>Alfarooq</internalName>
    <originalFilename>AlfarooqApp.exe</originalFilename>
  </versionInfo>
</launch4jConfig>
'@
        $config | Out-File -FilePath "config.xml" -Encoding UTF8
        
        # Run launch4j
        .\launch4j\launch4j.exe config.xml
        
        # Verify EXE was created
        if (Test-Path "AlfarooqApp.exe") {
          Write-Host "✅ EXE created successfully!"
          Copy-Item "AlfarooqApp.exe" -Destination "$Env:GITHUB_WORKSPACE"
        } else {
          Write-Host "❌ EXE not found, checking directory..."
          Get-ChildItem
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Alfarooq-EXE-Windows
        path: AlfarooqApp.exe
        retention-days: 5
