name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Download Gson
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path desktop\lib
        Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar" -OutFile "desktop\lib\gson-2.10.1.jar"
    
    - name: Compile Java
      shell: pwsh
      run: |
        cd desktop
        javac -cp "lib\gson-2.10.1.jar" -d . DesktopApp.java
    
    - name: Create JAR
      shell: pwsh
      run: |
        cd desktop
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class
    
    - name: Build EXE with jpackage
      shell: pwsh
      run: |
        New-Item -Path "C:\" -Name "build" -ItemType "directory" -Force
        Copy-Item "desktop/AlfarooqDesktop.jar" -Destination "C:\build\"
        Copy-Item "desktop/lib" -Destination "C:\build\" -Recurse
        Copy-Item "desktop/icons/app_icon.png" -Destination "C:\build\app_icon.png"
        
        cd C:\build
        
        jpackage --input . `
          --name "AlfarooqApp" `
          --main-jar "AlfarooqDesktop.jar" `
          --main-class "DesktopApp" `
          --type app-image `
          --icon "app_icon.png" `
          --dest "output"
        
        Compress-Archive -Path "output\AlfarooqApp" -DestinationPath "AlfarooqApp.zip" -Force
        Copy-Item "AlfarooqApp.zip" -Destination "$Env:GITHUB_WORKSPACE"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Alfarooq-EXE
        path: AlfarooqApp.zip
        retention-days: 30
