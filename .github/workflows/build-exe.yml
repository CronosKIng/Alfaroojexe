name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Folders and Dependencies
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "desktop\lib"
        Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar" -OutFile "desktop\lib\gson-2.10.1.jar"

    - name: Compile Java
      shell: pwsh
      run: |
        cd desktop
        javac -cp "lib\gson-2.10.1.jar" -d . DesktopApp.java

    - name: Create JAR
      shell: pwsh
      run: |
        cd desktop
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class

    - name: Build EXE with jpackage
      shell: pwsh
      run: |
        # Tumia D:\ drive (short path) badala ya C:\build
        $buildDir = "D:\b"
        New-Item -ItemType Directory -Force -Path $buildDir
        
        Copy-Item "desktop\AlfarooqDesktop.jar" -Destination "$buildDir\"
        Copy-Item "desktop\lib" -Destination "$buildDir\" -Recurse
        Copy-Item "desktop\icons\hgd.ico" -Destination "$buildDir\app.ico"
        
        cd $buildDir
        
        # jpackage na short path
        jpackage --input . `
          --name "AlfApp" `
          --main-jar "AlfarooqDesktop.jar" `
          --main-class "DesktopApp" `
          --type app-image `
          --dest "out" `
          --vendor "Alfarooq" `
          --description "Alfarooq Desktop App" `
          --icon "app.ico" `
          --temp "tmp" `
          --verbose
        
        # Compress output
        if (Test-Path "out\AlfApp") {
          Compress-Archive -Path "out\AlfApp" -DestinationPath "AlfarooqApp.zip" -Force
          Copy-Item "AlfarooqApp.zip" -Destination "$Env:GITHUB_WORKSPACE"
        } else {
          Write-Host "Output directory not found, checking..."
          Get-ChildItem -Recurse
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Alfarooq-EXE-Windows
        path: AlfarooqApp.zip
        retention-days: 5
