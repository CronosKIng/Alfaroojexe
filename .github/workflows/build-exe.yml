name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Build JAR and Library
      shell: pwsh
      run: |
        # Tengeneza lib folder na pakua Gson
        New-Item -ItemType Directory -Force -Path desktop\lib
        Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar" -OutFile "desktop\lib\gson-2.10.1.jar"
        
        # Compile Java
        cd desktop
        javac -cp "lib\gson-2.10.1.jar" -d . DesktopApp.java
        
        # Tengeneza JAR
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class
        cd ..
    
    - name: Package EXE (Safe Mode)
      shell: pwsh
      run: |
        # 1. Tenganisha INPUT na OUTPUT folders (Muhimu kuzuia loop)
        $IN = "C:\in_folder"
        $OUT = "C:\out_folder"
        New-Item -Path $IN -ItemType "directory" -Force
        New-Item -Path $OUT -ItemType "directory" -Force
        
        # 2. Nakili faili muhimu kwenda INPUT
        Copy-Item "desktop\AlfarooqDesktop.jar" -Destination "$IN\"
        Copy-Item "desktop\lib" -Destination "$IN\" -Recurse
        
        # 3. BADILISHA PNG KUWA ICO (Windows EXE inahitaji .ico)
        Add-Type -AssemblyName System.Drawing
        $pngPath = "$Env:GITHUB_WORKSPACE\desktop\icons\app_icon.png"
        $icoPath = "$IN\app_icon.ico"
        
        if (Test-Path $pngPath) {
            $bmp = [System.Drawing.Bitmap]::FromFile($pngPath)
            $bmp.Save($icoPath, [System.Drawing.Imaging.ImageFormat]::Icon)
            $bmp.Dispose()
            $iconArg = "--icon $icoPath"
        } else {
            $iconArg = "" # Kama picha haipo, itatumia icon ya kawaida
        }
        
        # 4. Endesha jpackage
        # Kumbuka: --input inasoma $IN, na --dest inaweka kwenye $OUT
        jpackage --input "$IN" `
          --name "AlfarooqApp" `
          --main-jar "AlfarooqDesktop.jar" `
          --main-class "DesktopApp" `
          --type app-image `
          $iconArg `
          --dest "$OUT"
        
        # 5. Zip matokeo na yarudishe kwenye workspace ya GitHub
        Compress-Archive -Path "$OUT\AlfarooqApp" -DestinationPath "$Env:GITHUB_WORKSPACE\AlfarooqApp.zip" -Force
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Alfarooq-Windows-Package
        path: AlfarooqApp.zip
        retention-days: 30
