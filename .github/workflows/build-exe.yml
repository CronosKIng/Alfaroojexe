name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Prepare Application Files
      shell: pwsh
      run: |
        # Unda folder la desktop/lib na pakua Gson
        New-Item -ItemType Directory -Force -Path desktop\lib
        Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar" -OutFile "desktop\lib\gson-2.10.1.jar"
        
        # Compile na kutengeneza JAR
        cd desktop
        javac -cp "lib\gson-2.10.1.jar" -d . DesktopApp.java
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class
        cd ..

    - name: Run JPackage (Safe Mode)
      shell: pwsh
      run: |
        # TENGANISHA FOLDERS KUZUIA LOOP
        New-Item -Path "C:\" -Name "in_folder" -ItemType "directory" -Force
        New-Item -Path "C:\" -Name "out_folder" -ItemType "directory" -Force
        
        # Nakili faili muhimu tu kwenda INPUT folder
        Copy-Item "desktop/AlfarooqDesktop.jar" -Destination "C:\in_folder\"
        Copy-Item "desktop/lib" -Destination "C:\in_folder\" -Recurse
        
        # Tengeneza EXE (Tumia 'exe' badala ya 'app-image' ili upate file moja la ku-install)
        jpackage --input "C:\in_folder" `
          --name "AlfarooqApp" `
          --main-jar "AlfarooqDesktop.jar" `
          --main-class "DesktopApp" `
          --type exe `
          --win-shortcut `
          --win-menu `
          --dest "C:\out_folder"
        
        # Nakili matokeo kurudi kwenye workspace ya GitHub
        Copy-Item -Path "C:\out_folder\*.exe" -Destination "$Env:GITHUB_WORKSPACE"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Alfarooq-Windows-Installer
        path: "*.exe"
        retention-days: 30
