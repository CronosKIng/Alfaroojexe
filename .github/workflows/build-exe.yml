name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Download Gson
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path desktop\lib
        Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar" -OutFile "desktop\lib\gson-2.10.1.jar"
    
    - name: Compile Java
      shell: pwsh
      run: |
        cd desktop
        javac -cp "lib\gson-2.10.1.jar" -d . DesktopApp.java
    
    - name: Create JAR
      shell: pwsh
      run: |
        cd desktop
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class
    
    - name: Build EXE with jpackage
      shell: pwsh
      run: |
        # Create working directory with short path
        New-Item -Path "C:\" -Name "build" -ItemType "directory" -Force
        Copy-Item "desktop/AlfarooqDesktop.jar" -Destination "C:\build\"
        Copy-Item "desktop/lib" -Destination "C:\build\" -Recurse
        Copy-Item "desktop/icons" -Destination "C:\build\" -Recurse -ErrorAction SilentlyContinue
        
        cd C:\build
        
        # Create simple icon
        New-Item -Path "C:\build\icons" -ItemType "directory" -Force
        Add-Type -AssemblyName System.Drawing
        $bmp = New-Object System.Drawing.Bitmap(256, 256)
        $g = [System.Drawing.Graphics]::FromImage($bmp)
        $g.Clear([System.Drawing.Color]::FromArgb(33, 150, 243))
        $font = New-Object System.Drawing.Font("Arial", 120, [System.Drawing.FontStyle]::Bold)
        $g.DrawString("A", $font, [System.Drawing.Brushes]::White, 70, 70)
        $iconPath = "C:\build\icons\app.ico"
        $bmp.Save($iconPath)
        
        # Build EXE (app-image type, no win-shortcut for app-image)
        jpackage --input . `
          --name "AlfarooqApp" `
          --main-jar "AlfarooqDesktop.jar" `
          --main-class "DesktopApp" `
          --type app-image `
          --icon "icons/app.ico" `
          --dest "output"
        
        # Compress the output folder
        Compress-Archive -Path "output\AlfarooqApp" -DestinationPath "AlfarooqApp.zip" -Force
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Alfarooq-EXE
        path: C:\build\AlfarooqApp.zip
        retention-days: 30
