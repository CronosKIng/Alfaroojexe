name: Build Windows EXE with Icons

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Download Gson
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path desktop\lib
        Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar" -OutFile "desktop\lib\gson-2.10.1.jar"
    
    - name: Compile Java
      shell: pwsh
      run: |
        cd desktop
        javac -cp "lib\gson-2.10.1.jar" -d . DesktopApp.java
    
    - name: Create JAR
      shell: pwsh
      run: |
        cd desktop
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class
    
    - name: Fix Path Limit and Run JPackage with Icons
      shell: pwsh
      run: |
        New-Item -Path "C:\" -Name "b" -ItemType "directory" -Force
        Copy-Item "desktop/AlfarooqDesktop.jar" -Destination "C:\b\"
        Copy-Item "desktop/lib" -Destination "C:\b\" -Recurse
        Copy-Item "desktop/icons" -Destination "C:\b\" -Recurse -ErrorAction SilentlyContinue
        
        cd C:\b
        
        # Create simple icon if not exists
        $iconPath = "C:\b\icons\app.ico"
        if (-not (Test-Path $iconPath)) {
            Add-Type -AssemblyName System.Drawing
            $bmp = New-Object System.Drawing.Bitmap(256, 256)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::Blue)
            $font = New-Object System.Drawing.Font("Arial", 120)
            $g.DrawString("A", $font, [System.Drawing.Brushes]::White, 50, 50)
            $bmp.Save($iconPath, [System.Drawing.Imaging.ImageFormat]::Png)
        }
        
        jpackage --input . `
          --name "AlfarooqApp" `
          --main-jar "AlfarooqDesktop.jar" `
          --main-class "DesktopApp" `
          --type app-image `
          --icon "icons/app.ico" `
          --win-shortcut `
          --win-menu `
          --dest "output"
        
        Compress-Archive -Path "output\AlfarooqApp" -DestinationPath "AlfarooqApp.zip" -Force
        Copy-Item "AlfarooqApp.zip" -Destination "$Env:GITHUB_WORKSPACE"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Alfarooq-Windows-EXE
        path: "AlfarooqApp.zip"
