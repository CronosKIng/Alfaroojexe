name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Build JAR
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path desktop\lib
        Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar" -OutFile "desktop\lib\gson-2.10.1.jar"
        cd desktop
        javac -cp "lib\gson-2.10.1.jar" -d . DesktopApp.java
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class
    
    - name: Run JPackage
      shell: pwsh
      run: |
        # 1. Folda za kazi
        $IN = "C:\in_folder"
        $OUT = "C:\out_folder"
        New-Item -ItemType Directory -Force -Path $IN
        New-Item -ItemType Directory -Force -Path $OUT
        
        # 2. Nakili faili
        Copy-Item "desktop\AlfarooqDesktop.jar" -Destination "$IN\"
        if (Test-Path "desktop\lib") { Copy-Item -Path "desktop\lib" -Destination "$IN\" -Recurse }
        
        # 3. TENGENEZA ICON (.ico) KWA NJIA SALAMA
        Add-Type -AssemblyName System.Drawing
        $pngPath = "$Env:GITHUB_WORKSPACE\desktop\icons\app_icon.png"
        $icoPath = "C:\in_folder\app_icon.ico"
        
        if (Test-Path $pngPath) {
            $bmp = [System.Drawing.Bitmap]::FromFile($pngPath)
            # Tunatengeneza icon rasmi
            $hIcon = $bmp.GetHicon()
            [System.Drawing.Icon]::FromHandle($hIcon).Save([System.IO.File]::Create($icoPath))
            $bmp.Dispose()
            Write-Host "Icon imetengenezwa: $icoPath"
            
            # Endesha jpackage PAMOJA na icon
            jpackage --input "$IN" `
              --name "AlfarooqApp" `
              --main-jar "AlfarooqDesktop.jar" `
              --main-class "DesktopApp" `
              --type app-image `
              --icon "$icoPath" `
              --dest "$OUT"
        } else {
            Write-Host "Picha haijapatikana, tunajenga bila icon."
            jpackage --input "$IN" `
              --name "AlfarooqApp" `
              --main-jar "AlfarooqDesktop.jar" `
              --main-class "DesktopApp" `
              --type app-image `
              --dest "$OUT"
        }
        
        # 4. Zip matokeo (Hakikisha folder lipo kwanza)
        if (Test-Path "$OUT\AlfarooqApp") {
            Compress-Archive -Path "$OUT\AlfarooqApp" -DestinationPath "$Env:GITHUB_WORKSPACE\AlfarooqApp.zip" -Force
        } else {
            Write-Error "JPackage haikutengeneza folder la AlfarooqApp!"
            exit 1
        }
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Alfarooq-Windows-Package
        path: AlfarooqApp.zip
