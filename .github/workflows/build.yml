name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download GSON
        run: |
          New-Item -ItemType Directory -Force -Path "desktop/lib"
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar" -OutFile "desktop/lib/gson.jar"

      - name: Compile Java Files
        run: |
          New-Item -ItemType Directory -Path "out" -Force
          cd desktop
          javac -cp "lib/gson.jar" -d ../out TranslationHelper.java DesktopApp.java
          cd ..
          cd out
          jar -xf ../desktop/lib/gson.jar
          cd ..
          jar --create --file AlfaroojApp.jar --main-class DesktopApp -C out .
          Move-Item -Force AlfaroojApp.jar desktop/lib/

      - name: Build EXE
        run: |
          jpackage --type exe --dest dist --input desktop/lib --main-jar AlfaroojApp.jar --main-class DesktopApp --name "Alfarooj" --icon desktop/icons/hgd.ico --win-shortcut --win-menu --vendor "Alfarooj"

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Alfarooj-Installer
          path: dist/*.exe
          retention-days: 30
